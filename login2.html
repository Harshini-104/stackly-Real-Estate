<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real Estate</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  .real-header {
    width: 100%;
    position: fixed;
    top: 0;
    background: rgba(152, 154, 163, 0.75);
    backdrop-filter: blur(10px);
    z-index: 1000;
    font-family: 'Segoe UI', sans-serif;
  }

  .container {
    max-width: 1200px;
    margin: auto;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #fff;
  }

  .logo img {
    width: 180px;
  }


  .nav-menu ul {
    display: flex;
    list-style: none;
    gap: 30px;
  }

  .nav-menu ul li {
    position: relative;
  }

  .nav-menu ul li a {
    text-decoration: none;
    color: #fff;
    font-weight: 500;
    transition: 0.3s;
  }

  .nav-menu ul li a i {
    margin-right: 6px;
  }

  .nav-menu ul li a:hover {
    color: #321abc;
  }



  .nav-right {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .login-btn {
    padding: 8px 18px;
    background: #421abc;
    color: #fff;
    text-decoration: none;
    border-radius: 5px;
    transition: 0.3s;
  }

  .login-btn:hover {
    background: #847fde;
  }


  .hamburger {
    display: none;
    font-size: 24px;
    color: #fff;
    cursor: pointer;
  }




  @media (max-width: 992px) {


    .hamburger {
      display: block;
    }


    .nav-menu {
      position: fixed;
      top: 0;
      left: -100%;
      width: 260px;
      height: 100vh;
      background: #8a48ec;
      padding-top: 80px;
      transition: 0.4s ease;
      z-index: 999;
    }


    .nav-menu.active {
      left: 0;
    }


    .nav-menu ul {
      flex-direction: column;
      gap: 25px;
      padding-left: 30px;
    }

    .nav-menu ul li a {
      font-size: 18px;
    }


    .logo img {
      width: 140px;
    }
  }

  @media (max-width: 576px) {

    .container {
      padding: 12px 15px;
    }

    .logo img {
      width: 120px;
    }

    .login-btn {
      padding: 6px 14px;
      font-size: 14px;
    }
  }



  body {
    height: 118vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f4f4f4;
  }

  .auth-wrapper {
    width: 1000px;
    height: 600px;
    display: flex;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
    background: #fff;
  }


  .auth-left {
    width: 50%;
    background: url('https://images.unsplash.com/photo-1568605114967-8130f3a36994') center/cover no-repeat;
    position: relative;
  }

  .auth-left::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(66, 26, 188, 0.7);
    top: 0;
    left: 0;
  }

  .overlay-text {
    position: absolute;
    color: #fff;
    z-index: 2;
    text-align: center;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .overlay-text h1 {
    font-size: 36px;
    margin-bottom: 10px;
  }


  .auth-right {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .form-container {
    width: 80%;
  }


  .form-tabs {
    display: flex;
    margin-bottom: 30px;
  }

  .tab-btn {
    flex: 1;
    padding: 12px;
    border: none;
    background: #eee;
    cursor: pointer;
    font-weight: bold;
  }

  .tab-btn.active {
    background: #421abc;
    color: #fff;
  }


  .form {
    display: none;
    flex-direction: column;
  }

  .form.active-form {
    display: flex;
  }

  .form h2 {
    margin-bottom: 20px;
    color: #421abc;
  }

  .form input {
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  .form button {
    padding: 12px;
    border: none;
    background: #421abc;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
  }

  .form button:hover {
    background: #2f0f8f;
  }


  @media (max-width: 992px) {

    body {
      align-items: flex-start;
      padding: 40px 0;
    }

    .auth-wrapper {
      width: 95%;
      height: auto;
      flex-direction: column;
    }

    .auth-left {
      width: 100%;
      height: 250px;
    }

    .auth-right {
      width: 100%;
      padding: 40px 0;
    }

    .form-container {
      width: 85%;
    }


    .form {
      position: relative;
      display: none;
    }

    .form.active-form {
      display: flex;
    }
  }



  @media (max-width: 576px) {

    .auth-left {
      height: 200px;
    }

    .overlay-text h1 {
      font-size: 24px;
    }

    .form-tabs {
      margin-bottom: 20px;
    }

    .tab-btn {
      font-size: 14px;
      padding: 10px;
    }

    .form h2 {
      font-size: 20px;
    }

    .form input {
      font-size: 14px;
      padding: 10px;
    }

    .form button {
      font-size: 14px;
      padding: 10px;
    }

  }
</style>

<body>
  <header class="real-header">
    <div class="container">

      <div class="logo">
        <img src="./image/logo.webp" alt="Logo">
      </div>

      <nav class="nav-menu" id="navMenu">
        <ul>
          <li><a href="./home2.html">Home</a></li>
          <li><a href="./about2.html">About</a></li>
          <li><a href="./properties.html">Properties</a></li>
          <li><a href="./blog2.html">Blog</a></li>
          <li><a href="./dashboard2.html">Dashboard</a></li>
          <li><a href="./contact2.html">Contact</a></li>
        </ul>
      </nav>

      <div class="nav-right">


        <div class="hamburger" id="hamburger">
          <i class="fa-solid fa-bars"></i>
        </div>
      </div>

    </div>
  </header>



  <!-- section login -->

  <div class="auth-wrapper">

    <!-- Left Image Section -->
    <div class="auth-left">
      <div class="overlay-text">
        <h1>Welcome to DreamHome</h1>
        <p>Your perfect property partner.</p>
      </div>
    </div>

    <!-- Right Form Section -->
    <div class="auth-right">

      <div class="form-container">

        <!-- Tabs -->
        <div class="form-tabs">
          <button class="tab-btn active" onclick="showLogin()">Login</button>
          <button class="tab-btn" onclick="showSignup()">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="form active-form">
          <h2>Login</h2>
          <input type="email" placeholder="Email" required>
          <input type="password" placeholder="Password" required>
          <button type="submit">Login</button>
        </form>

        <!-- Sign Up Form -->
        <form id="signupForm" class="form">
          <h2>Create Account</h2>
          <input type="text" placeholder="Full Name" required>
          <input type="email" placeholder="Email" required>
          <input type="password" placeholder="Password" required>
          <input type="password" placeholder="Re-enter Password" required>
          <button type="submit">Sign Up</button>
        </form>

      </div>

    </div>

  </div>

  <script>
    function showLogin() {
      document.getElementById("loginForm").classList.add("active-form");
      document.getElementById("signupForm").classList.remove("active-form");
      document.querySelectorAll(".tab-btn")[0].classList.add("active");
      document.querySelectorAll(".tab-btn")[1].classList.remove("active");
    }

    function showSignup() {
      document.getElementById("signupForm").classList.add("active-form");
      document.getElementById("loginForm").classList.remove("active-form");
      document.querySelectorAll(".tab-btn")[1].classList.add("active");
      document.querySelectorAll(".tab-btn")[0].classList.remove("active");
    }
  </script>




  <script>
    const hamburger = document.getElementById("hamburger");
    const navMenu = document.getElementById("navMenu");
    const dropdown = document.querySelector(".dropdown");

    hamburger.addEventListener("click", () => {
      navMenu.classList.toggle("active");
    });

    dropdown.addEventListener("click", () => {
      dropdown.classList.toggle("active");
    });
  </script>

</body>

</html>
